
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soko Yetu — Live Promo Editor · Buphagus Bridge Ltd</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A017;
  --gold2: #F5C518;
  --gold3: rgba(212,160,23,0.1);
  --amber: #E07B0A;
  --red: #DC2626;
  --red2: #FF4444;
  --wa: #25D366;
  --black: #050608;
  --dark: #090C10;
  --panel: #0D1117;
  --card: #111820;
  --border: rgba(212,160,23,0.18);
  --border2: rgba(255,255,255,0.06);
  --white: #F8F4EC;
  --muted: rgba(248,244,236,0.4);
  --green: #16A34A;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══ HEADER ═══ */
.hdr {
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 300;
}

.hdr-brand { display:flex; align-items:center; gap:10px; }

.hdr-logo {
  width:34px; height:34px; border-radius:8px;
  background:var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue'; font-size:18px; color:var(--black);
  flex-shrink:0;
}

.hdr-name { font-family:'Bebas Neue'; font-size:18px; letter-spacing:3px; }
.hdr-sub { font-family:'DM Mono', monospace; font-size:8px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); opacity:.6; }

.hdr-badge {
  font-family:'DM Mono', monospace; font-size:9px;
  letter-spacing:2px; text-transform:uppercase;
  color:rgba(37,211,102,.7);
  border:1px solid rgba(37,211,102,.25);
  padding:4px 10px; border-radius:20px;
  display:flex; align-items:center; gap:6px;
}

.live-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--wa);
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ═══ TEMPLATE SELECTOR ═══ */
.tpl-bar {
  background:var(--panel);
  border-bottom:1px solid var(--border2);
  display:flex; gap:2px; padding:0 16px;
  overflow-x:auto; scrollbar-width:none;
  position:sticky; top:63px; z-index:200;
}
.tpl-bar::-webkit-scrollbar { display:none; }

.tpl-btn {
  background:none; border:none;
  border-bottom:3px solid transparent;
  color:var(--muted);
  font-family:'DM Mono', monospace; font-size:10px;
  letter-spacing:2px; text-transform:uppercase;
  padding:13px 18px 10px; cursor:pointer;
  white-space:nowrap; transition:all .2s;
}
.tpl-btn:hover { color:var(--white); }
.tpl-btn.active { color:var(--gold); border-bottom-color:var(--gold); }

/* ═══ MAIN LAYOUT ═══ */
.main {
  display:grid;
  grid-template-columns: 340px 1fr;
  min-height: calc(100vh - 120px);
}

@media(max-width:760px) {
  .main { grid-template-columns:1fr; }
  .preview-col { order:-1; }
}

/* ═══ INPUT PANEL ═══ */
.input-col {
  background:var(--panel);
  border-right:1px solid var(--border2);
  padding:24px 20px;
  overflow-y:auto;
  max-height:calc(100vh - 120px);
  position:sticky;
  top:120px;
}

.ip-section { margin-bottom:24px; }

.ip-label {
  font-family:'DM Mono', monospace; font-size:9px;
  letter-spacing:3px; text-transform:uppercase;
  color:var(--gold); margin-bottom:10px;
  display:flex; align-items:center; gap:8px;
}

.ip-label::after {
  content:''; flex:1; height:1px;
  background:rgba(212,160,23,.15);
}

/* Input fields */
.field { margin-bottom:10px; }

.field-lbl {
  font-family:'DM Mono', monospace; font-size:8px;
  letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); margin-bottom:4px; display:block;
}

.field input, .field select {
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:6px;
  padding:9px 12px;
  color:var(--white);
  font-family:'Barlow Condensed', sans-serif;
  font-size:15px; font-weight:600; letter-spacing:.3px;
  outline:none; transition:border-color .2s;
  -webkit-appearance:none;
}

.field input:focus, .field select:focus {
  border-color:rgba(212,160,23,.4);
  background:rgba(212,160,23,.04);
}

.field select option { background:#1A1A1A; }

/* Product rows */
.product-row {
  display:grid; grid-template-columns:1fr 90px 28px;
  gap:6px; margin-bottom:6px; align-items:center;
}

.product-row input {
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  border-radius:6px; padding:8px 10px;
  color:var(--white);
  font-family:'Barlow Condensed', sans-serif;
  font-size:14px; font-weight:600;
  outline:none; transition:border-color .2s;
  width:100%;
}

.product-row input:focus { border-color:rgba(212,160,23,.35); }

.product-row input.price-in {
  text-align:right;
  color:var(--gold2);
}

.del-btn {
  background:rgba(220,38,38,.1);
  border:1px solid rgba(220,38,38,.2);
  color:rgba(220,38,38,.6);
  border-radius:5px; width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:14px;
  transition:all .2s; flex-shrink:0;
}
.del-btn:hover { background:rgba(220,38,38,.25); color:#FF6060; }

.add-btn {
  width:100%;
  background:rgba(212,160,23,.08);
  border:1px dashed rgba(212,160,23,.3);
  color:rgba(212,160,23,.6);
  border-radius:6px; padding:8px;
  font-family:'DM Mono', monospace; font-size:9px;
  letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; transition:all .2s; margin-top:4px;
}
.add-btn:hover { background:rgba(212,160,23,.15); color:var(--gold); }

/* Category blocks */
.cat-block {
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.05);
  border-radius:8px; padding:12px; margin-bottom:10px;
}

.cat-block-head {
  display:flex; align-items:center; gap:8px; margin-bottom:10px;
}

.cat-emoji-sel {
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:5px; padding:4px 8px;
  color:var(--white); font-size:16px;
  cursor:pointer; outline:none;
  width:44px; text-align:center;
  font-family:'Barlow Condensed', sans-serif;
}

.cat-name-in {
  flex:1;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:6px; padding:6px 10px;
  color:var(--white);
  font-family:'Barlow Condensed', sans-serif;
  font-size:14px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
  outline:none;
}
.cat-name-in:focus { border-color:rgba(212,160,23,.35); }

/* Action buttons */
.action-row {
  display:flex; gap:8px; margin-top:16px;
}

.act-btn {
  flex:1; padding:11px 14px;
  border-radius:8px; border:none;
  font-family:'Bebas Neue'; font-size:16px;
  letter-spacing:2px; cursor:pointer;
  transition:all .2s;
}

.act-primary {
  background:var(--gold); color:var(--black);
}
.act-primary:hover { background:var(--gold2); transform:scale(1.02); }

.act-secondary {
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  color:var(--muted);
}
.act-secondary:hover { background:rgba(255,255,255,.1); color:var(--white); }

/* Tip box */
.tip-box {
  background:rgba(37,211,102,.06);
  border:1px solid rgba(37,211,102,.15);
  border-radius:8px; padding:12px;
  margin-top:16px;
}
.tip-box p {
  font-family:'DM Mono', monospace; font-size:9px;
  letter-spacing:1px; line-height:1.7;
  color:rgba(37,211,102,.6);
}

/* ═══ PREVIEW COLUMN ═══ */
.preview-col {
  padding:32px 24px;
  display:flex; flex-direction:column;
  align-items:center; gap:16px;
  background:var(--black);
}

.preview-label {
  font-family:'DM Mono', monospace; font-size:9px;
  letter-spacing:3px; text-transform:uppercase;
  color:var(--muted); text-align:center;
}

/* Card frame 9:16 */
.card-frame {
  width:280px;
  aspect-ratio:9/16;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  box-shadow: 0 0 0 1px var(--border), 0 30px 80px rgba(0,0,0,.9);
  flex-shrink:0;
}

/* Watermark */
.card-frame::after {
  content:'Concept by Albuk Global';
  position:absolute; bottom:10px; left:50%;
  transform:translateX(-50%);
  font-family:'DM Mono', monospace; font-size:7px;
  letter-spacing:2px; text-transform:uppercase;
  color:rgba(255,255,255,.18);
  background:rgba(0,0,0,.3);
  padding:3px 10px; border-radius:20px;
  white-space:nowrap; pointer-events:none; z-index:999;
}

.card-frame.light-wm::after {
  color:rgba(0,0,0,.18); background:rgba(255,255,255,.28);
}

/* Screenshot hint */
.screenshot-hint {
  font-family:'DM Mono', monospace; font-size:9px;
  letter-spacing:2px; text-transform:uppercase;
  color:rgba(212,160,23,.4); text-align:center;
}

/* Pages */
.tpl-page { display:none; width:100%; align-items:center; flex-direction:column; gap:16px; }
.tpl-page.active { display:flex; }

/* ════════════════════════
   TEMPLATE 1 — HOT DEALS
════════════════════════ */
.t1 {
  height:100%; display:flex; flex-direction:column;
  background:var(--black); position:relative; overflow:hidden;
}

.t1-glow {
  position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 110% 45% at 50% 0%, rgba(212,160,23,.16) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(224,123,10,.07) 0%, transparent 55%);
}

.t1-grid {
  position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(212,160,23,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,160,23,.04) 1px, transparent 1px);
  background-size:22px 22px;
}

.t1-inner { position:relative; z-index:5; display:flex; flex-direction:column; height:100%; }

.t1h {
  background:var(--gold); padding:14px 16px 10px;
  position:relative; overflow:hidden; flex-shrink:0;
}
.t1h::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(0,0,0,.05) 5px,rgba(0,0,0,.05) 10px);
}
.t1h-top { position:relative; display:flex; align-items:center; justify-content:space-between; }
.t1h-brand { font-family:'Bebas Neue'; font-size:11px; letter-spacing:2px; color:rgba(0,0,0,.5); }
.t1h-main { position:relative; margin-top:4px; text-align:center; }
.t1h-title { font-family:'Bebas Neue'; font-size:22px; letter-spacing:2px; color:var(--black); line-height:1; }
.t1h-date { font-family:'DM Mono', monospace; font-size:7px; letter-spacing:2px; color:rgba(0,0,0,.4); text-transform:uppercase; margin-top:2px; }

.t1-body { flex:1; padding:10px 12px 0; display:flex; flex-direction:column; gap:8px; overflow:hidden; }

.t1-cat-lbl {
  font-family:'DM Mono', monospace; font-size:7px;
  letter-spacing:3px; text-transform:uppercase;
  color:var(--gold); margin-bottom:5px;
  padding-bottom:4px; border-bottom:1px solid rgba(212,160,23,.2);
}

.t1-items { display:flex; flex-direction:column; gap:3px; }

.t1-item {
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:6px; padding:6px 9px;
}

.t1-iname { font-size:11px; font-weight:600; color:var(--white); letter-spacing:.2px; flex:1; }
.t1-iprice { font-family:'Bebas Neue'; font-size:17px; color:var(--gold2); letter-spacing:.5px; }
.t1-ikes { font-family:'DM Mono', monospace; font-size:6px; color:rgba(245,197,24,.45); margin-left:1px; }

.t1-div { height:1px; background:linear-gradient(90deg,transparent,rgba(212,160,23,.2),transparent); margin:2px 12px; flex-shrink:0; }

.t1-foot {
  background:var(--dark); padding:9px 12px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.t1-del { font-size:9px; font-weight:700; letter-spacing:.3px; color:var(--wa); text-transform:uppercase; }
.t1-cta {
  background:var(--gold); color:var(--black);
  font-family:'Bebas Neue'; font-size:13px; letter-spacing:1.5px;
  padding:5px 12px; border-radius:4px;
}

/* ════════════════════════
   TEMPLATE 2 — FLASH DEAL
════════════════════════ */
.t2 {
  height:100%; display:flex; flex-direction:column;
  background:#080305; position:relative; overflow:hidden;
}

.t2-burst {
  position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 80% 55% at 50% 30%, rgba(220,38,38,.2) 0%, transparent 55%),
    radial-gradient(ellipse 50% 30% at 50% 85%, rgba(212,160,23,.09) 0%, transparent 50%);
  animation:t2p 2s ease-in-out infinite alternate;
}
@keyframes t2p { from{opacity:.6} to{opacity:1} }

.t2-scan {
  position:absolute; inset:0; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px);
}

.t2-inner { position:relative; z-index:5; display:flex; flex-direction:column; height:100%; }

.t2-alarm {
  background:var(--red); padding:7px 12px;
  display:flex; align-items:center; justify-content:center; gap:7px;
  flex-shrink:0; animation:t2a 1.5s ease-in-out infinite;
}
@keyframes t2a { 0%,100%{opacity:1} 50%{opacity:.7} }
.t2-adot { width:6px; height:6px; border-radius:50%; background:#fff; animation:t2d 1s ease-in-out infinite; }
@keyframes t2d { 0%,100%{opacity:1} 50%{opacity:.15} }
.t2-atxt { font-family:'Bebas Neue'; font-size:13px; letter-spacing:3px; color:#fff; }

.t2-hero { padding:12px 14px 8px; text-align:center; flex-shrink:0; }
.t2-logo { font-family:'DM Mono', monospace; font-size:8px; letter-spacing:4px; text-transform:uppercase; color:rgba(212,160,23,.45); margin-bottom:6px; }
.t2-hl { font-family:'Bebas Neue'; line-height:.92; letter-spacing:2px; }
.t2-hl .tg { color:var(--gold2); font-size:46px; display:block; }
.t2-hl .tr { color:var(--red2); font-size:30px; display:block; }

.t2-timer {
  margin:6px 12px;
  background:rgba(255,255,255,.05); border:1px solid rgba(220,38,38,.3);
  border-radius:7px; padding:6px 10px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.t2-tlbl { font-family:'DM Mono', monospace; font-size:7px; letter-spacing:2px; text-transform:uppercase; color:rgba(220,38,38,.8); }
.t2-tval { font-family:'Bebas Neue'; font-size:18px; color:var(--red2); letter-spacing:2px; }

.t2-items { flex:1; padding:0 12px; display:flex; flex-direction:column; gap:5px; overflow:hidden; }

.t2-item {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(220,38,38,.2);
  border-left:3px solid var(--red);
  border-radius:0 7px 7px 0; padding:7px 10px;
}

.t2-fire { font-size:14px; flex-shrink:0; }
.t2-iname { font-size:12px; font-weight:700; color:var(--white); flex:1; }
.t2-ipc { text-align:right; }
.t2-iprice { font-family:'Bebas Neue'; font-size:20px; color:var(--gold2); line-height:1; }
.t2-ikes { font-family:'DM Mono', monospace; font-size:6px; color:rgba(245,197,24,.4); }

.t2-stock {
  margin:6px 12px; flex-shrink:0;
  background:rgba(220,38,38,.1); border:1px solid rgba(220,38,38,.22);
  border-radius:6px; padding:6px 10px;
  display:flex; align-items:center; gap:6px;
}
.t2-stxt { font-size:10px; font-weight:700; letter-spacing:.3px; text-transform:uppercase; color:rgba(255,70,70,.85); }

.t2-foot {
  background:rgba(0,0,0,.5); padding:10px 12px;
  flex-shrink:0; text-align:center;
}
.t2-url { font-family:'Bebas Neue'; font-size:18px; letter-spacing:3px; color:var(--gold2); display:block; }
.t2-sub { font-family:'DM Mono', monospace; font-size:7px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
.t2-brand { font-family:'DM Mono', monospace; font-size:7px; letter-spacing:2px; text-transform:uppercase; color:rgba(212,160,23,.25); margin-top:5px; }

/* ════════════════════════
   TEMPLATE 3 — CATEGORY
════════════════════════ */
.t3 {
  height:100%; display:flex; flex-direction:column;
  background:#F5F0E8; position:relative; overflow:hidden;
}

.t3-strip {
  background:var(--black); padding:9px 12px;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.t3-brand { font-family:'Bebas Neue'; font-size:13px; letter-spacing:3px; color:var(--gold); }
.t3-tag { font-family:'DM Mono', monospace; font-size:7px; letter-spacing:2px; text-transform:uppercase; color:rgba(212,160,23,.35); }

.t3-ribbon {
  background:var(--gold); padding:9px 12px;
  position:relative; flex-shrink:0; overflow:hidden;
}
.t3-ribbon::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.06) 4px,rgba(0,0,0,.06) 8px);
}
.t3-rib-in { position:relative; text-align:center; }
.t3-rib-title { font-family:'Bebas Neue'; font-size:20px; letter-spacing:2px; color:var(--black); line-height:1; }
.t3-rib-sub { font-family:'DM Mono', monospace; font-size:7px; letter-spacing:2px; color:rgba(0,0,0,.38); text-transform:uppercase; }

.t3-hero {
  background:linear-gradient(135deg,#FFF8E7,#FFEEBC); padding:14px 14px 10px;
  text-align:center; flex-shrink:0;
}
.t3-icon { font-size:38px; display:block; margin-bottom:3px; }
.t3-cname { font-family:'Bebas Neue'; font-size:24px; letter-spacing:2px; color:#1A1A1A; line-height:1; }
.t3-csub { font-family:'DM Mono', monospace; font-size:7px; letter-spacing:2px; text-transform:uppercase; color:rgba(0,0,0,.3); margin-top:2px; }

.t3-items { flex:1; padding:8px 12px 6px; display:flex; flex-direction:column; gap:5px; overflow:hidden; }

.t3-item {
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(255,255,255,.92); border-radius:7px;
  padding:8px 10px; border:1px solid rgba(0,0,0,.06);
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.t3-check { font-size:12px; margin-right:7px; flex-shrink:0; }
.t3-iname { font-size:12px; font-weight:700; color:#1A1A1A; flex:1; }
.t3-price-pill {
  background:var(--gold); color:var(--black);
  font-family:'Bebas Neue'; font-size:15px; letter-spacing:.5px;
  padding:2px 9px; border-radius:3px; white-space:nowrap;
}

.t3-notice {
  margin:0 12px 6px; padding:6px 10px; flex-shrink:0;
  background:rgba(220,38,38,.07); border:1px solid rgba(220,38,38,.18);
  border-radius:5px; text-align:center;
}
.t3-ntxt { font-size:10px; font-weight:700; letter-spacing:.3px; text-transform:uppercase; color:rgba(170,0,0,.75); }

.t3-foot {
  background:var(--black); padding:10px 12px;
  flex-shrink:0; text-align:center;
}
.t3-url { font-family:'Bebas Neue'; font-size:16px; letter-spacing:3px; color:var(--gold2); display:block; }
.t3-app { font-family:'DM Mono', monospace; font-size:7px; letter-spacing:2px; text-transform:uppercase; color:rgba(212,160,23,.35); margin-top:2px; }

/* ════════════════════════
   TEMPLATE 4 — FESTIVE
════════════════════════ */
.t4 {
  height:100%; display:flex; flex-direction:column;
  background:#06080A; position:relative; overflow:hidden;
}
.t4-stars {
  position:absolute; inset:0; pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 15% 20%, rgba(255,220,80,.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 10%, rgba(255,220,80,.5) 0%, transparent 100%),
